# Org-wide Issue Self-Assign
#
# Reusable workflow that lets external contributors self-assign issues by
# commenting a trigger keyword (default: /claim). Uses bdougie/take-action
# with a PAT to perform the assignment on behalf of non-members.
#
# Usage in caller repos:
#
#   # .github/workflows/self-assign.yml
#   name: Issue self-assign
#   on:
#     issue_comment:
#       types: [created]
#   permissions:
#     contents: read
#     issues: write
#   jobs:
#     self-assign:
#       uses: kagenti/.github/.github/workflows/self-assign-reusable.yml@main
#       secrets:
#         ISSUE_ASSIGN_TOKEN: ${{ secrets.ISSUE_ASSIGN_TOKEN }}
#
# All inputs have sensible defaults. Override only what you need.
#
# Reference: https://github.com/bdougie/take-action
#
name: Issue self-assign

on:
  workflow_call:
    inputs:
      trigger:
        description: 'Comment keyword that triggers self-assignment'
        required: false
        type: string
        default: '/claim'
      blockingLabels:
        description: 'Comma-separated labels that prevent assignment'
        required: false
        type: string
        default: 'blocked,in-progress'
      message:
        description: 'Reply posted after successful assignment'
        required: false
        type: string
        default: >-
          Thanks for claiming this issue! If you get stuck or need to step away,
          comment `/unassign` or ask a maintainer.
    secrets:
      ISSUE_ASSIGN_TOKEN:
        required: true

jobs:
  self_assign:
    name: Assign commenter to issue
    if: ${{ github.repository != 'kagenti/.github' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Assign commenter to the issue
        if: >-
          ${{ github.event.issue != null
              && startsWith(github.event.comment.body, inputs.trigger) }}
        uses: bdougie/take-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.ISSUE_ASSIGN_TOKEN }}
        with:
          message: ${{ inputs.message }}
          blockingLabels: ${{ inputs.blockingLabels }}
          blockingLabelsMessage: 'This issue is currently unavailable. Please choose another issue.'
          trigger: ${{ inputs.trigger }}
